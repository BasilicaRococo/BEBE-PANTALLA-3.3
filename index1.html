<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BEBE PANTALLA — VERSAILLES 1973</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&display=swap');
:root {
  --pink:#ff8fb8; --candy:#ff4d94; --gold:#d4a843; --goldl:#f0c85a;
  --p:#33ff33; --pd:#1a8c1a; --pk:#0a3d0a;
  --err:#ff3333; --cor:#ff00ff; --amber:#ffb000;
  --bg:#000500;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:radial-gradient(ellipse at 50% 20%,#1a0a1e,#060008);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:'VT323',monospace;
  overflow:hidden;
  perspective:1200px;
}

/* ── EGG SHELL — translucent 90s console (see-through with colored internals) ─── */
#egg{
  width:820px;
  position:relative;
  /* Keep original tamagotchi egg shape */
  border-radius:50% 50% 46% 46% / 40% 40% 60% 60%;
  /* Translucent pink plastic — internal colored zones show through */
  background:
    /* Teal circuit zone top-left (visible internal component) */
    radial-gradient(ellipse 120px 60px at 8% 18%,rgba(80,180,200,.18),transparent),
    /* Copper trace zone top-right */
    radial-gradient(ellipse 100px 50px at 92% 15%,rgba(180,130,80,.15),transparent),
    /* White plastic rib left side */
    radial-gradient(ellipse 40px 200px at 3% 50%,rgba(255,255,255,.10),transparent),
    /* White plastic rib right side */
    radial-gradient(ellipse 40px 200px at 97% 50%,rgba(255,255,255,.10),transparent),
    /* Teal bottom zone (PCB area) */
    radial-gradient(ellipse 300px 50px at 50% 95%,rgba(60,160,180,.12),transparent),
    /* Subtle highlight across top */
    linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 20%),
    /* Translucent pink plastic base */
    linear-gradient(160deg,rgba(255,200,220,.28),rgba(255,175,205,.20));
  border:2px solid rgba(255,160,200,.4);
  box-shadow:
    0 0 0 3px rgba(255,180,210,.18),
    0 0 40px rgba(255,100,160,.15),
    inset 0 2px 0 rgba(255,255,255,.35),
    inset 0 -2px 0 rgba(255,160,200,.15),
    inset 3px 0 0 rgba(255,255,255,.08),
    inset -3px 0 0 rgba(255,255,255,.08),
    0 50px 120px rgba(0,0,0,.75);
  padding:16px 16px 26px;
  overflow:visible;
  animation:eggbreathe 6s ease-in-out infinite;
}
@keyframes eggbreathe{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.008);}}

/* Lucite internal structure lines */
.cv{position:absolute;width:1px;top:10%;bottom:10%;
  background:linear-gradient(180deg,transparent,rgba(255,160,200,.18),transparent);z-index:1;}
.ch{position:absolute;height:1px;left:5%;right:5%;
  background:linear-gradient(90deg,transparent,rgba(200,220,255,.15),transparent);z-index:1;}
/* Screws */
.sc{position:absolute;width:11px;height:11px;border-radius:50%;z-index:100;
  border:1.5px solid rgba(255,160,200,.5);
  background:radial-gradient(circle,rgba(255,255,255,.28),rgba(200,230,255,.08));
  box-shadow:inset 0 1px 2px rgba(255,255,255,.35);}
.sc::after{content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(45deg);
  width:55%;height:1.5px;background:rgba(255,150,190,.55);}

/* Frosting drips */
.dr{position:absolute;top:-5px;
  background:linear-gradient(180deg,rgba(255,190,215,.95),rgba(255,215,232,.75));
  border-radius:0 0 50% 50%;box-shadow:0 2px 8px rgba(255,120,180,.25);z-index:101;}

/* Egg top label */
.egg-label{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel Decorative',serif;font-size:8px;
  color:rgba(255,155,195,.65);letter-spacing:5px;white-space:nowrap;
  text-shadow:0 0 10px rgba(255,100,160,.4);z-index:103;}

/* Device header */
.dtop{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding:0 8px;position:relative;z-index:10;}
.dlabel{font-family:'Cinzel Decorative',serif;font-size:9px;
  color:rgba(255,155,195,.55);letter-spacing:4px;}
.led{width:8px;height:8px;border-radius:50%;background:var(--pink);
  box-shadow:0 0 6px var(--pink),0 0 18px rgba(255,143,184,.4);
  animation:lp 2s ease-in-out infinite;}
@keyframes lp{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── SCREEN ─── */
.bezel{
  background:rgba(3,2,6,.94);border-radius:8px;padding:3px;
  border:1.5px solid rgba(255,140,190,.28);
  box-shadow:inset 0 0 30px rgba(0,0,0,.9),0 0 20px rgba(255,100,160,.08);}
.screen{
  background:var(--bg);border-radius:5px;
  width:100%;height:380px;position:relative;overflow:hidden;cursor:none;}
.screen::before{content:'';position:absolute;inset:0;z-index:20;pointer-events:none;
  background:repeating-linear-gradient(0deg,
    transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);}
.screen::after{content:'';position:absolute;inset:0;z-index:21;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,.78) 100%);}
.sglow{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 38%,rgba(51,255,51,.055),transparent 70%);
  transition:background 1.5s;}
#moireCanvas{position:absolute;inset:0;z-index:2;width:100%;height:100%;image-rendering:pixelated;opacity:.6;}
#vhsCanvas{position:absolute;inset:0;z-index:3;width:100%;height:100%;opacity:0;transition:opacity 1.5s;}
#bubbleCanvas{position:absolute;inset:0;z-index:4;width:100%;height:100%;opacity:0;transition:opacity 1.8s;pointer-events:none;image-rendering:pixelated;}
#bebeCanvas{position:absolute;inset:0;z-index:6;width:100%;height:100%;}
#rippleCanvas{position:absolute;inset:0;z-index:7;width:100%;height:100%;opacity:0;transition:opacity 1.5s;pointer-events:none;mix-blend-mode:screen;}
#glitchOverlay{position:absolute;inset:0;z-index:19;pointer-events:none;opacity:0;}

/* Status */
.sline{position:absolute;top:10px;left:12px;right:12px;font-size:15px;
  color:var(--p);text-shadow:0 0 8px var(--p);z-index:22;line-height:1.5;}
.cb{display:inline-block;width:8px;height:14px;background:var(--p);
  vertical-align:bottom;animation:bk .8s step-end infinite;margin-left:2px;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:0;}}

/* Stats */
.stats{position:absolute;bottom:8px;left:12px;right:12px;z-index:22;}
.srow{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.slabel{font-size:13px;color:var(--pd);width:80px;letter-spacing:1px;}
.sout{flex:1;height:9px;background:var(--pk);border:1px solid var(--pd);overflow:hidden;position:relative;}
.sin{height:100%;background:var(--p);box-shadow:0 0 6px var(--p);transition:width .4s,background .5s;}
.sin::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,.2) 3px,rgba(0,0,0,.2) 4px);}
.sval{font-size:13px;color:var(--pd);width:30px;text-align:right;}
.danger .sin{background:var(--err);box-shadow:0 0 8px var(--err);animation:bd .4s step-end infinite;}
@keyframes bd{0%,100%{opacity:1;}50%{opacity:.45;}}
.warn .sin{background:var(--amber);box-shadow:0 0 6px var(--amber);}
.corrupt .sin{background:var(--cor);box-shadow:0 0 10px var(--cor);}

/* RPG Dialogue in screen */
#dlg{position:absolute;bottom:56px;left:10px;right:10px;z-index:30;
  display:none;flex-direction:column;gap:0;pointer-events:none;}
#dlg.open{display:flex;}
#dlg-name{background:#000;border:1px solid var(--p);border-bottom:none;
  padding:2px 12px;font-size:14px;color:var(--p);text-shadow:0 0 8px var(--p);
  letter-spacing:3px;display:inline-block;align-self:flex-start;}
#dlg-box{background:rgba(0,4,0,.93);border:1px solid var(--p);
  box-shadow:0 0 16px rgba(51,255,51,.16),inset 0 0 20px rgba(0,0,0,.6);
  padding:10px 14px 22px;min-height:62px;position:relative;}
#dlg-text{font-size:17px;color:var(--p);text-shadow:0 0 6px var(--p);line-height:1.45;letter-spacing:1px;}
#dlg-next{position:absolute;bottom:6px;right:12px;font-size:12px;
  color:var(--pd);animation:bk .7s step-end infinite;letter-spacing:2px;}

/* ── BUTTONS ─── */
.btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;position:relative;z-index:10;}
.btn{
  background:rgba(255,160,200,.055);border:1px solid rgba(255,140,190,.22);
  border-radius:8px;color:rgba(255,160,200,.42);
  font-family:'VT323',monospace;font-size:15px;
  letter-spacing:2px;padding:11px 4px;cursor:pointer;
  text-transform:uppercase;transition:all .15s;text-align:center;
  box-shadow:0 2px 0 rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(2px);position:relative;}
.btn:hover{background:rgba(255,140,190,.14);color:var(--pink);
  border-color:rgba(255,140,190,.5);
  box-shadow:0 0 14px rgba(255,100,160,.2),0 2px 0 rgba(0,0,0,.4);}
.btn:active{transform:translateY(1px);}
.bsub{font-size:9px;color:rgba(255,120,170,.28);display:block;letter-spacing:1px;margin-top:1px;}
.notif{position:absolute;top:-4px;right:-4px;width:9px;height:9px;
  border-radius:50%;background:var(--candy);box-shadow:0 0 6px var(--candy);
  display:none;animation:lp .5s infinite;}
.btn.nn .notif{display:block;}

/* Code input */
#codeWrap{margin-top:10px;display:flex;gap:8px;align-items:center;justify-content:center;position:relative;z-index:10;}
#codeInput{
  background:rgba(255,140,190,.04);border:1px solid rgba(255,140,190,.15);
  border-radius:4px;color:rgba(255,160,200,.48);
  font-family:'VT323',monospace;font-size:14px;
  letter-spacing:4px;padding:4px 10px;width:190px;text-align:center;outline:none;
  caret-color:rgba(255,160,200,.5);}
#codeInput::placeholder{color:rgba(255,140,190,.18);letter-spacing:2px;}
#codeInput:focus{border-color:rgba(255,140,190,.32);color:rgba(255,180,210,.7);}

/* Dreaming state */
.dreaming .sglow{background:radial-gradient(ellipse at 50% 38%,rgba(100,0,255,.14),transparent 70%);}
.dreaming .sline{color:#9955ff;text-shadow:0 0 8px #9955ff;}
.dreaming .sin{background:#7722ee;box-shadow:0 0 8px #7722ee;}
.dreaming #moireCanvas{opacity:.15;}
.dreaming #vhsCanvas{opacity:.72;}
.dreaming #dlg-name{color:#9955ff;border-color:#9955ff;}
.dreaming #dlg-box{border-color:#9955ff;}
.dreaming #dlg-text{color:#bb88ff;text-shadow:0 0 6px #9955ff;}

/* ── FALLING SPRINKLES (canvas overlay on egg) ─── */
#sprinkleCanvas{
  position:absolute;inset:0;z-index:102;pointer-events:none;
  border-radius:50% 50% 46% 46% / 40% 40% 60% 60%;
  overflow:hidden;}

#rpg{
  display:none;position:fixed;inset:0;z-index:1000;
  background:#000;flex-direction:column;font-family:'IM Fell English SC',serif;}
#rpg.open{display:flex;}
#rpg-bg{position:absolute;inset:0;z-index:0;
  background:url('data:image/jpeg;base64,/9j/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAQrBkAD...')center/cover no-repeat;
  filter:brightness(.28) sepia(.4) hue-rotate(20deg);}
#rpg-bg-full{position:absolute;inset:0;z-index:0;}
#rpg-canvas{width:100%;flex:1;display:block;position:relative;z-index:1;}
#rpg-ui{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:rgba(148,155,210,.96);
  border-top:2px solid rgba(212,168,67,.55);
  backdrop-filter:blur(4px);}
#rpg-namebar{
  display:inline-block;
  background:rgba(120,128,195,.98);
  border:1px solid rgba(212,168,67,.6);border-bottom:none;
  padding:3px 18px;margin-left:22px;
  font-family:'IM Fell English SC',serif;font-size:15px;
  color:rgba(212,168,67,1);text-shadow:0 1px 8px rgba(180,130,0,.6);
  letter-spacing:3px;}
#rpg-text{
  padding:14px 26px 20px;
  font-family:'IM Fell English SC',serif;font-size:20px;
  color:rgba(255,245,200,.92);text-shadow:0 1px 3px rgba(80,60,0,.3);
  line-height:1.55;letter-spacing:.5px;min-height:82px;}
#rpg-prompt{
  position:absolute;bottom:14px;right:26px;font-size:13px;
  font-family:'IM Fell English SC',serif;
  color:rgba(210,60,80,.85);letter-spacing:3px;animation:bk .8s step-end infinite;}
#rpg-choices{display:none;padding:0 26px 18px;gap:6px;flex-direction:column;}
#rpg-choices.open{display:flex;}
.rpg-choice{
  font-size:17px;color:rgba(30,18,8,.7);letter-spacing:1px;cursor:pointer;
  padding:4px 0;background:none;border:none;
  font-family:'IM Fell English SC',serif;
  text-align:left;transition:color .1s;}
.rpg-choice:hover{color:rgba(10,5,2,.95);text-shadow:0 0 8px rgba(212,168,67,.4);}
#rpg-close{
  position:absolute;top:14px;right:22px;
  font-family:'IM Fell English SC',serif;
  font-size:13px;color:rgba(80,30,30,.5);letter-spacing:2px;
  cursor:pointer;border:none;background:none;z-index:20;pointer-events:auto;}
#rpg-close:hover{color:rgba(160,40,40,.9);}

/* Fashion world doors */
.mirror-door{
  position:absolute;cursor:pointer;
  border:2px solid rgba(212,168,67,.45);
  transition:border-color .2s,box-shadow .2s;}
.mirror-door:hover{border-color:rgba(255,215,100,.9);
  box-shadow:0 0 20px rgba(255,215,100,.3),inset 0 0 20px rgba(255,215,100,.05);}
.mirror-door-label{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(212,168,67,.55);letter-spacing:3px;white-space:nowrap;}
</style>
</head>
<body>

<!-- RPG OVERLAY -->
<div id="rpg">
  <canvas id="rpg-bg-full"></canvas>
  <canvas id="rpg-canvas"></canvas>
  <div id="rpg-ui">
    <div id="rpg-namebar">BEBE PANTALLA</div>
    <div id="rpg-text"><span id="rpg-t"></span></div>
    <div id="rpg-prompt">▼ CONTINUAR</div>
    <div id="rpg-choices"></div>
  </div>
  <button id="rpg-close" onclick="rpgClose()">[ SALIR ]</button>
</div>

<!-- EGG -->
<div id="egg">
  <!-- Structure -->
  <canvas id="sprinkleCanvas"></canvas>
  <div class="cv" style="left:7%"></div>
  <div class="cv" style="right:7%"></div>
  <div class="ch" style="top:32%"></div>
  <div class="ch" style="top:66%"></div>
  <div class="sc" style="top:13px;left:13px"></div>
  <div class="sc" style="top:13px;right:13px"></div>
  <div class="sc" style="bottom:22px;left:13px"></div>
  <div class="sc" style="bottom:22px;right:13px"></div>
  <div class="sc" style="top:13px;left:50%;transform:translateX(-50%)"></div>
  <!-- Drips -->
  <div class="dr" style="left:7%;width:20px;height:26px"></div>
  <div class="dr" style="left:19%;width:14px;height:17px"></div>
  <div class="dr" style="left:32%;width:22px;height:30px"></div>
  <div class="dr" style="left:48%;width:17px;height:20px;transform:translateX(-50%)"></div>
  <div class="dr" style="left:60%;width:24px;height:27px"></div>
  <div class="dr" style="left:75%;width:15px;height:16px"></div>
  <div class="dr" style="left:87%;width:19px;height:22px"></div>
  <div class="egg-label">BEBE PANTALLA ✦ VERSAILLES 1973 ✦ MODA</div>

  <div class="dtop">
    <span class="dlabel">BATALLA DE VERSAILLES · 28.XI.1973</span>
    <div class="led"></div>
  </div>

  <div class="bezel">
    <div class="screen" id="screen">
      <div class="sglow" id="sglow"></div>
      <canvas id="moireCanvas"></canvas>
      <canvas id="vhsCanvas"></canvas>
      <canvas id="bubbleCanvas"></canvas>
      <canvas id="bebeCanvas"></canvas>
      <canvas id="rippleCanvas"></canvas>
      <div id="glitchOverlay"></div>
      <div class="sline" id="sline">INITIALIZING...<span class="cb"></span></div>
      <div id="dlg">
        <div id="dlg-name">BEBE PANTALLA</div>
        <div id="dlg-box">
          <div id="dlg-text"></div>
          <div id="dlg-next">▼ PRESS TALK</div>
        </div>
      </div>
      <div class="stats">
        <div class="srow" id="row-lonely">
          <span class="slabel">LONELY</span>
          <div class="sout"><div class="sin" id="bar-lonely" style="width:60%"></div></div>
          <span class="sval" id="val-lonely">60</span>
        </div>
        <div class="srow" id="row-dream">
          <span class="slabel">DREAM</span>
          <div class="sout"><div class="sin" id="bar-dream" style="width:75%"></div></div>
          <span class="sval" id="val-dream">75</span>
        </div>
        <div class="srow" id="row-glitch">
          <span class="slabel">FRAGMENT</span>
          <div class="sout"><div class="sin" id="bar-glitch" style="width:8%"></div></div>
          <span class="sval" id="val-glitch">8</span>
        </div>
      </div>
    </div>
  </div>

  <div class="btns">
    <button class="btn" id="btn-talk"  onclick="action('talk')">
      TALK<span class="bsub">[loneliness]</span><div class="notif"></div>
    </button>
    <button class="btn" id="btn-dream" onclick="action('dream')">
      DREAM<span class="bsub">[dream state]</span><div class="notif"></div>
    </button>
    <button class="btn" id="btn-fix"   onclick="action('fix')">
      RESTORE<span class="bsub">[fragment]</span><div class="notif"></div>
    </button>
  </div>
  <div id="codeWrap">
    <input id="codeInput" type="text" maxlength="20"
      placeholder="CODE WORD" autocomplete="off" spellcheck="false">
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════
//  BEBE PANTALLA — BATALLA DE VERSAILLES 1973
//  Fashion creates. Fashion fragments.
// ═══════════════════════════════════════════════════════════════

// ── SPRINKLES FALLING ────────────────────────────────────────
const egg = document.getElementById('egg');
const spkC = document.getElementById('sprinkleCanvas');
const spkCtx = spkC.getContext('2d');
const SPRINKLE_COLORS = ['#ff4d94','#ff9ecc','#ffd700','#b366ff','#66ccff','#ff6666','#66ff99','#ffaa44','#ff88dd','#aaff44'];

function resizeSprinkle(){
  spkC.width = egg.offsetWidth;
  spkC.height = egg.offsetHeight;
}
resizeSprinkle();
window.addEventListener('resize', resizeSprinkle);

const sprinkles = [];
for(let i=0;i<55;i++){
  sprinkles.push({
    x: Math.random()*100,
    y: Math.random()*100 - 30,
    w: 2 + Math.random()*3,
    h: 6 + Math.random()*8,
    rot: Math.random()*180,
    rotV: (Math.random()-.5)*2,
    vy: 0.3 + Math.random()*0.7,
    vx: (Math.random()-.5)*0.3,
    col: SPRINKLE_COLORS[Math.floor(Math.random()*SPRINKLE_COLORS.length)],
    opacity: 0.7 + Math.random()*.3,
  });
}
function drawSprinkles(){
  spkCtx.clearRect(0,0,spkC.width,spkC.height);
  // Solo confeti cuando BeBe está bien: lonely<40 y glitch<30
  const bebeOK = S.lonely<40 && S.glitch<30 && !S.isDreaming;
  if(!bebeOK) return;
  const W = spkC.width, H = spkC.height;
  sprinkles.forEach(s=>{
    s.y += s.vy;
    s.x += s.vx;
    s.rot += s.rotV;
    if(s.y > 110) { s.y = -5 - Math.random()*20; s.x = Math.random()*100; }
    if(s.x < 0) s.x = 100; if(s.x > 100) s.x = 0;
    const px = s.x/100*W, py = s.y/100*H;
    spkCtx.save();
    spkCtx.globalAlpha = s.opacity;
    spkCtx.translate(px, py);
    spkCtx.rotate(s.rot * Math.PI/180);
    spkCtx.fillStyle = s.col;
    spkCtx.shadowColor = s.col;
    spkCtx.shadowBlur = 3;
    spkCtx.fillRect(-s.w/2, -s.h/2, s.w, s.h);
    spkCtx.restore();
  });
}

// ── STATE ────────────────────────────────────────────────────
const S = {
  lonely:60, dream:75, glitch:8,
  isDreaming:false, lastInteract:Date.now(), age:0,
  talkedBefore:false, fragmentPhase:0,
  // 0=whole 1=hairline cracks 2=visible 3=heavy 4=melting 5=dissolved
};
try{const s=JSON.parse(localStorage.getItem('bebeS4'));
  if(s){S.lonely=s.lonely??60;S.dream=s.dream??75;S.glitch=s.glitch??8;
        S.age=s.age??0;S.talkedBefore=s.talkedBefore??false;}}catch(e){}
function save(){try{localStorage.setItem('bebeS4',JSON.stringify(
  {lonely:S.lonely,dream:S.dream,glitch:S.glitch,age:S.age,talkedBefore:S.talkedBefore}));}catch(e){}}
function cl(v){return Math.max(0,Math.min(100,v));}

// ── CANVAS ───────────────────────────────────────────────────
const screen = document.getElementById('screen');
const mC=document.getElementById('moireCanvas');
const vC=document.getElementById('vhsCanvas');

// ── MODERN INIT: async image load so animation starts reliably ──
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>reject(new Error('Image failed to load'));
    img.src=src;
  });
}

function mColor(v){
  const n=(v+1)*.5;
  const bw=(Math.sin(n*Math.PI*24)+1)*.5;
  const ca=Math.min(1,Math.max(0,(Math.abs(v)-(1-COLORSHIFT*.01))/(COLORSHIFT*.01+.001)));
  const hue=((v*180+360+mT*.3)%360+360)%360;
  const h=hue/60,hi=Math.floor(h)%6,f=h-Math.floor(h);
  let cr,cg,cb;
  if(hi===0){cr=1;cg=f;cb=0;}else if(hi===1){cr=1-f;cg=1;cb=0;}
  else if(hi===2){cr=0;cg=1;cb=f;}else if(hi===3){cr=0;cg=1-f;cb=1;}
  else if(hi===4){cr=f;cg=0;cb=1;}else{cr=1;cg=0;cb=1-f;}
  return[Math.max(0,Math.min(255,Math.round((bw*(1-ca)+cr*ca)*255))),
         Math.max(0,Math.min(255,Math.round((bw*(1-ca)+cg*ca)*255))),
         Math.max(0,Math.min(255,Math.round((bw*(1-ca)+cb*ca)*255)))];
}
let _mOff=null;
function renderMoire(){
  if(!SW||!SH)return;
  const bW=Math.ceil(SW/2),bH=Math.ceil(SH/2);
  if(!_mOff||_mOff.width!==bW||_mOff.height!==bH){
    _mOff=document.createElement('canvas');_mOff.width=bW;_mOff.height=bH;
  }
  const mOCtx=_mOff.getContext('2d');
  const mImg=mCtx.createImageData(bW,bH);const mPx=mImg.data;
  for(let py=0;py<bH;py++){
    for(let px=0;px<bW;px++){
      const nx=px/bW,ny=py/bH;let sum=0;
      for(let i=0;i<mSrc.length;i++){
        const s=mSrc[i],dx=nx-s.x,dy=ny-s.y;
        sum+=Math.sin(Math.sqrt(dx*dx+dy*dy)*DENSITY*20-mT*s.freq+s.phase);
      }
      sum/=mSrc.length;
      const c=mColor(sum),idx=(py*bW+px)*4;
      mPx[idx]=c[0];mPx[idx+1]=c[1];mPx[idx+2]=c[2];mPx[idx+3]=255;
    }
  }
  mOCtx.putImageData(mImg,0,0);
  mCtx.save();mCtx.imageSmoothingEnabled=false;mCtx.drawImage(_mOff,0,0,SW,SH);mCtx.restore();
  mSrc.forEach(s=>{
    s.x+=s.drift[0];s.y+=s.drift[1];
    if(s.x<0||s.x>1)s.drift[0]*=-1;if(s.y<0||s.y>1)s.drift[1]*=-1;
  });
}

const BUBBLE_COLORS=[
  [180,120,255],[120,200,255],[255,120,210],[100,255,200],[255,210,100]
];
const bubbles=[];
for(let i=0;i<28;i++) bubbles.push(makeBubble(true));
function makeBubble(scattered){
  const r=4+Math.floor(Math.random()*7)*2; // even pixel radii: 4,6,8,10,12,14,16
  return{
    x:scattered?Math.random()*(SW||340):Math.random()*(SW||340),
    y:scattered?(SH||380)*(.1+Math.random()*.85):(SH||380)+r*2,
    r,
    vx:(Math.random()-.5)*.18,
    vy:-(.15+Math.random()*.25),
    wobble:Math.random()*Math.PI*2,
    wobbleSpeed:.008+Math.random()*.012,
    alpha:.55+Math.random()*.35,
    col:BUBBLE_COLORS[Math.floor(Math.random()*BUBBLE_COLORS.length)],
    life:1,
    popT:0,popping:false,
    drift:Math.sin(Math.random()*Math.PI*2),
  };
}
function drawPixelCircle(ctx,cx,cy,r,col,alpha){
  // Pixel-art circle: only draw pixels that fall inside the ring
  const R2=r*r,rIn=(r-2),rIn2=rIn*rIn;
  for(let py=-r;py<=r;py++){
    for(let px=-r;px<=r;px++){
      const d2=px*px+py*py;
      if(d2<=R2&&d2>rIn2){
        // Iridescent color shift per angle
        const ang=Math.atan2(py,px);
        const shift=((ang/(Math.PI*2)+.5)*3)%1;
        const [br,bg,bb]=col;
        // Mix base color with a hue-shifted highlight
        const hShift=Math.sin(shift*Math.PI*2+bubbleT*.5);
        const nr=Math.round(br*(1-hShift*.4)+200*hShift*.4);
        const ng=Math.round(bg*(1-hShift*.4)+180*hShift*.4);
        const nb=Math.round(bb*(1-hShift*.4)+255*hShift*.4);
        ctx.fillStyle=`rgba(${Math.min(255,nr)},${Math.min(255,ng)},${Math.min(255,nb)},${alpha})`;
        ctx.fillRect(Math.round(cx)+px,Math.round(cy)+py,1,1);
      }
    }
  }
  // Specular highlight pixel(s)
  ctx.fillStyle=`rgba(255,255,255,${alpha*.7})`;
  ctx.fillRect(Math.round(cx)-Math.round(r*.3),Math.round(cy)-Math.round(r*.4),2,2);
}
let bubbleT=0;
function renderBubbles(){
  if(!SW||!SH)return;
  bubbleCtx.clearRect(0,0,SW,SH);
  bubbleT+=0.016;
  bubbles.forEach((b,i)=>{
    if(!b.popping){
      b.x+=b.vx+Math.sin(bubbleT*b.wobbleSpeed*60+b.wobble)*.28;
      b.y+=b.vy;
      b.wobble+=b.wobbleSpeed;
      // Random pop
      if(Math.random()<.0012) b.popping=true;
      // Wrap: if goes off top, reset from bottom
      if(b.y<-b.r*2){
        bubbles[i]=makeBubble(false);
        bubbles[i].y=(SH||380)+b.r;
      }
      // Clamp x
      if(b.x<-b.r)b.x=(SW||340)+b.r;
      if(b.x>(SW||340)+b.r)b.x=-b.r;
      drawPixelCircle(bubbleCtx,b.x,b.y,b.r,b.col,b.alpha);
    } else {
      // Pop animation: expand + fade
      b.popT+=.18;
      const pr=Math.round(b.r*(1+b.popT*.7));
      const pa=b.alpha*(1-b.popT);
      if(pa>0.02) drawPixelCircle(bubbleCtx,b.x,b.y,Math.min(pr,20),b.col,pa);
      if(b.popT>1) bubbles[i]=makeBubble(false);
    }
  });
}

let rippleT=0;
function renderRipple(){
  if(!SW||!SH)return;
  rippleT+=0.022;
  const DOLL_W=Math.round(SW*.26),DOLL_H=Math.round(DOLL_W*(760/501));
  const cx=Math.round(bebe.x),cy=Math.round(bebe.y);
  rippleCtx.clearRect(0,0,SW,SH);
  // Sample pixels from bebeCanvas and displace them wave-fashion
  // Use displacement map approach: draw bebe-region shifted by sine waves
  const srcW=DOLL_W+20,srcH=DOLL_H+20;
  const sx=cx-srcW/2,sy=cy-srcH/2;
  // Multiple overlapping sine wave passes with slight offsets for liquid feel
  const waves=5;
  for(let w=0;w<waves;w++){
    const freq=.018+w*.006;
    const amp=3+Math.sin(rippleT*.7+w)*.8;
    const phase=rippleT*(.9+w*.15)+w*1.1;
    const alpha=.13-w*.018;
    if(alpha<=0)continue;
    rippleCtx.save();
    rippleCtx.globalAlpha=alpha;
    // Horizontal displacement pass
    for(let row=0;row<srcH;row+=2){
      const dy=Math.sin(row*freq+phase)*amp;
      const dx=Math.cos(row*freq*.7+phase+1.2)*amp*.5;
      rippleCtx.drawImage(bC,
        0,Math.max(0,sy+row-2),SW,2,
        dx,Math.max(0,sy+row-2)+dy,SW,2
      );
    }
    rippleCtx.restore();
  }
  // Add a thin iridescent sheen along the silhouette edge
  rippleCtx.save();
  const sheen=rippleCtx.createLinearGradient(cx-DOLL_W/2,cy-DOLL_H/2,cx+DOLL_W/2,cy+DOLL_H/2);
  const hue=((rippleT*18)%360+360)%360;
  sheen.addColorStop(0,`hsla(${hue},80%,70%,.12)`);
  sheen.addColorStop(.5,`hsla(${(hue+120)%360},90%,80%,.07)`);
  sheen.addColorStop(1,`hsla(${(hue+240)%360},80%,70%,.12)`);
  rippleCtx.globalCompositeOperation='screen';
  rippleCtx.fillStyle=sheen;
  rippleCtx.fillRect(cx-DOLL_W/2,cy-DOLL_H/2,DOLL_W,DOLL_H);
  rippleCtx.restore();
}

let vhsT=0;
function renderVhs(){
  if(!SW||!SH)return;
  const id=vCtx.createImageData(SW,SH);const d=id.data;
  for(let y=0;y<SH;y++){
    const w=Math.sin(y*.08+vhsT*2)*1.2+Math.sin(y*.3+vhsT*7)*.4;
    const gy=y/SH;
    for(let x=0;x<SW;x++){
      const idx=(y*SW+x)*4;
      const n=(Math.random()-.5)*16;
      const h=(200+Math.sin(vhsT*.3+y*.015)*40+Math.sin(vhsT*.7+x*.008)*20);
      const l=.22+Math.sin(vhsT*.5+gy*Math.PI)*.08;
      function hsl2rgb(h,s,l){
        h=((h%360)+360)%360;const c=(1-Math.abs(2*l-1))*s;
        const xv=c*(1-Math.abs((h/60)%2-1));const m=l-c/2;
        let r=0,g=0,b=0;
        if(h<60){r=c;g=xv;}else if(h<120){r=xv;g=c;}
        else if(h<180){g=c;b=xv;}else if(h<240){g=xv;b=c;}
        else if(h<300){r=xv;b=c;}else{r=c;b=xv;}
        return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];
      }
      const [br,bg,bb]=hsl2rgb(h,.55,l);
      const sc=y%2===0?1:.87;
      d[idx]=Math.max(0,Math.min(255,Math.round((br+n)*sc)));
      d[idx+1]=Math.max(0,Math.min(255,Math.round((bg+n*.5)*sc)));
      d[idx+2]=Math.max(0,Math.min(255,Math.round((bb+n*.3)*sc)));
      d[idx+3]=255;
    }
  }
  vCtx.putImageData(id,0,0);
  if(Math.random()<.04){
    vCtx.fillStyle='rgba(255,255,255,0.04)';
    vCtx.fillRect(0,Math.floor(Math.random()*SH),SW,1);
  }
}

// ── BEBE DRAWING — PROGRESSIVE FRAGMENTATION ─────────────────
// 0-15: whole  15-30: hairline  30-50: cracking  50-70: heavy  70-85: melting  85-100: dissolved
const _chCache={};
function _chSplit(img,W,H,keepCh){
  const key=`${W}x${H}x${keepCh}`;
  if(_chCache[key])return _chCache[key];
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const x=c.getContext('2d');x.drawImage(img,0,0,W,H);
  const d=x.getImageData(0,0,W,H);
  for(let i=0;i<d.data.length;i+=4){
    if(keepCh!==0)d.data[i]=0;
    d.data[i+1]=0;
    if(keepCh!==2)d.data[i+2]=0;
  }
  x.putImageData(d,0,0);
  _chCache[key]=c;return c;
}
function drawBebe(){
  bCtx.clearRect(0,0,SW,SH);
  if(!dollImg||!SW)return;
  const DW=Math.round(SW*.26),DH=Math.round(DW*(760/501));
  const g=S.glitch,t=performance.now()*.001;

  // ── TORNADO: spin with trailing ghost copies ──
  if(tornadoActive){
    const trails=7;
    for(let i=trails;i>=0;i--){
      const ang=bebe.tornadoAngle-i*0.35;
      const orbitR=30+Math.sin(tornadoT*3)*18;
      const tx2=SW/2+Math.cos(ang)*orbitR;
      const ty2=SH/2+Math.sin(ang)*orbitR*.35;
      const sc=bebe.scale*(1-i*.04);
      const alpha=i===0?1:(0.55-i*.07);
      if(alpha<=0)continue;
      bCtx.save();
      bCtx.translate(tx2,ty2);
      bCtx.rotate(ang);
      bCtx.scale(sc,sc);
      bCtx.globalAlpha=alpha;
      if(i===0){
        // Main copy: rainbow screen blend
        bCtx.drawImage(dollImg,-DW/2,-DH/2,DW,DH);
        bCtx.globalCompositeOperation='screen';bCtx.globalAlpha=.4;
        bCtx.fillStyle=`hsl(${(t*120)%360},100%,60%)`;
        bCtx.fillRect(-DW/2,-DH/2,DW,DH);
      } else {
        bCtx.globalCompositeOperation='screen';
        bCtx.drawImage(dollImg,-DW/2,-DH/2,DW,DH);
      }
      bCtx.restore();
    }
    // Speed lines from center
    bCtx.save();
    bCtx.globalAlpha=.18;
    bCtx.strokeStyle=`hsl(${(t*80)%360},100%,70%)`;
    bCtx.lineWidth=1.5;
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2+tornadoT*3;
      bCtx.beginPath();
      bCtx.moveTo(SW/2+Math.cos(a)*15,SH/2+Math.sin(a)*8);
      bCtx.lineTo(SW/2+Math.cos(a)*80,SH/2+Math.sin(a)*45);
      bCtx.stroke();
    }
    bCtx.restore();
    return;
  }

  bCtx.save();
  bCtx.translate(bebe.x,bebe.y);bCtx.rotate(bebe.tilt*Math.PI/180);bCtx.scale(bebe.scale,bebe.scale);
  const draw=(a=1)=>{bCtx.globalAlpha=a;bCtx.drawImage(dollImg,-DW/2,-DH/2,DW,DH);};

  if(S.isDreaming){
    draw(.52);
    [0,120,240].forEach((hOff,i)=>{
      bCtx.save();bCtx.translate(Math.sin(t*.7+i*2.1)*5,0);
      bCtx.globalCompositeOperation='screen';bCtx.globalAlpha=.15;draw();
      bCtx.globalCompositeOperation='hue';bCtx.globalAlpha=.32;
      bCtx.fillStyle=`hsl(${((t*20+hOff)%360+360)%360},100%,50%)`;
      bCtx.fillRect(-DW/2,-DH/2,DW,DH);bCtx.restore();
    });
    bCtx.globalCompositeOperation='source-over';bCtx.globalAlpha=1;

  } else if(g<15){
    draw();
    const aura=bCtx.createRadialGradient(0,0,DW*.05,0,0,DW*.7);
    aura.addColorStop(0,'rgba(51,255,51,0)');aura.addColorStop(1,'rgba(51,255,51,.06)');
    bCtx.globalCompositeOperation='screen';bCtx.fillStyle=aura;
    bCtx.fillRect(-DW/2,-DH/2,DW,DH);

  } else if(g<30){
    const ch=Math.round((g-15)/15*4)+1;
    draw(.95);
    bCtx.globalCompositeOperation='screen';bCtx.globalAlpha=.25;
    bCtx.drawImage(_chSplit(dollImg,DW,DH,0),-DW/2+ch,-DH/2,DW,DH);

  } else {
    // Phases 2-5: shared channel-split + intensity logic
    const intensity=g<50?(g-30)/20:g<70?(g-50)/20:g<85?(g-70)/15:(g-85)/15;
    const split=g<50?Math.round(intensity*12)+4:g<70?Math.round(intensity*22)+12:Math.round(intensity*30)+12;
    const offR=Math.round(-split*(1+Math.sin(t*.003)*.5));
    const offB=Math.round(split*(1+Math.cos(t*.004)*.5));
    const baseA=g<50?.88:g<70?.85:.55;
    bCtx.globalCompositeOperation='screen';bCtx.globalAlpha=baseA;
    bCtx.drawImage(_chSplit(dollImg,DW,DH,0),-DW/2+offR,-DH/2,DW,DH);
    bCtx.globalAlpha=baseA;
    bCtx.drawImage(_chSplit(dollImg,DW,DH,2),-DW/2+offB,-DH/2,DW,DH);
    bCtx.globalCompositeOperation='source-over';

    if(g<50){
      draw(.7);
      if(Math.random()<intensity*.3){
        bCtx.restore();bCtx.save();bCtx.translate(bebe.x,bebe.y);
        bCtx.globalAlpha=.55;
        const ty=-DH/2+Math.random()*DH;
        bCtx.fillStyle=`rgba(${Math.random()<.5?255:0},0,${Math.random()<.5?255:0},.5)`;
        bCtx.fillRect(-DW/2,ty,DW,2+Math.random()*4);
      }
    } else if(g<70){
      draw(.55);
      bCtx.restore();bCtx.save();bCtx.translate(bebe.x,bebe.y);bCtx.rotate(bebe.tilt*Math.PI/180);
      bCtx.globalAlpha=.4;
      for(let sy=0;sy<DH;sy+=4){
        const mX=Math.sin(t*.002+sy*.16)*intensity*16*(Math.random()<.1?Math.random()*4:1);
        bCtx.drawImage(dollImg,0,sy,DW,4,-DW/2+mX,sy-DH/2,DW,4);
      }
      for(let i=0;i<Math.floor(intensity*4);i++){
        bCtx.globalAlpha=.6;
        bCtx.fillStyle=`rgba(${Math.random()<.5?255:0},0,${Math.random()<.5?255:0},.55)`;
        bCtx.fillRect(-DW/2,-DH/2+Math.random()*DH,DW,1+Math.random()*6);
      }
    } else if(g<85){
      bCtx.globalAlpha=.3;bCtx.drawImage(dollImg,-DW/2,-DH/2,DW,DH);
      bCtx.restore();bCtx.save();bCtx.translate(bebe.x,bebe.y);
      for(let sy=0;sy<DH;sy+=3){
        const mX=Math.sin(t*.003+sy*.2)*intensity*28+Math.sin(t*1.1+sy*.09)*intensity*14;
        bCtx.globalAlpha=.6*(1-intensity*.4);
        bCtx.drawImage(dollImg,0,sy,DW,3,-DW/2+mX,sy-DH/2,DW,3);
      }
    } else {
      for(let i=0;i<12;i++){
        const fx=(Math.random()-.5)*DW,fy=(Math.random()-.5)*DH;
        const fw=Math.random()*DW*.4,fh=Math.random()*DH*.15;
        bCtx.globalAlpha=.4+Math.random()*.3;
        bCtx.drawImage(dollImg,Math.random()*DW*.8,Math.random()*DH*.8,fw,fh,fx-DW/2,fy-DH/2,fw*(1+intensity),fh);
      }
      bCtx.globalCompositeOperation='screen';bCtx.globalAlpha=.3;
      bCtx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
      bCtx.fillRect(-DW/2,-DH/2,DW,DH);
    }
  }
  bCtx.restore();
}

function updateBebe(dt){
  if(!SW)return;
  const DOLL_W=Math.round(SW*.26),DOLL_H=Math.round(DOLL_W*(760/501));

  if(tornadoActive){
    tornadoT+=dt;
    // Spin faster over time, orbit center, scale pulses
    const speed=4+tornadoT*1.2;
    bebe.tornadoAngle+=dt*speed;
    const orbitR=30+Math.sin(tornadoT*3)*18;
    bebe.x=SW/2+Math.cos(bebe.tornadoAngle)*orbitR;
    bebe.y=SH/2+Math.sin(bebe.tornadoAngle)*orbitR*.35;
    bebe.tilt=(bebe.tornadoAngle*180/Math.PI)%360;
    bebe.scale=1+Math.sin(tornadoT*8)*.18;
    bebe.vx=0;bebe.vy=0;
    return;
  }

  bebe.phase+=dt*1.1*(S.isDreaming?.4:1);
  const baseX=SW/2+Math.sin(bebe.phase*.61)*8;
  const baseY=SH/2-10+(-Math.sin(bebe.phase)*18);
  const talking=S.lastInteract>Date.now()-3000&&!S.isDreaming;
  if(talking){
    const dx=mx-bebe.x,dy=my-bebe.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    bebe.vx+=(dx/dist)*Math.min(100,dist)*.013;
    bebe.vy+=(dy/dist)*Math.min(100,dist)*.013;
  }
  bebe.vx+=(baseX-bebe.x)*.05;bebe.vy+=(baseY-bebe.y)*.05;
  bebe.vx*=.88;bebe.vy*=.88;
  bebe.x+=bebe.vx;bebe.y+=bebe.vy;
  const hw=DOLL_W/2+20,hh=DOLL_H/2+20;
  if(bebe.x<hw)bebe.vx+=(hw-bebe.x)*.15;
  if(bebe.x>SW-hw)bebe.vx+=(SW-hw-bebe.x)*.15;
  if(bebe.y<hh)bebe.vy+=(hh-bebe.y)*.15;
  if(bebe.y>SH-hh)bebe.vy+=(SH-hh-bebe.y)*.15;
  const targetTilt=bebe.vx*1.8+Math.sin(bebe.phase*.61)*2;
  bebe.tilt+=(targetTilt-bebe.tilt)*.1;
  bebe.scale=1+Math.sin(bebe.phase*.5)*.008;
  const shakeAmt=S.glitch>50?(S.glitch-50)/50:0;
  if(shakeAmt>0&&Math.random()<shakeAmt*.6){
    bebe.x+=(Math.random()-.5)*shakeAmt*S.glitch*.15;
    bebe.y+=(Math.random()-.5)*shakeAmt*S.glitch*.08;
  }
}

// ── GLITCH OVERLAY — SEVERE ──────────────────────────────────
function renderGlitch(){
  const g=S.glitch;
  if(g<20){goEl.style.cssText='opacity:0';return;}
  const intensity=(g-20)/80;
  if(Math.random()>intensity*.6+.05){goEl.style.cssText='opacity:0';return;}
  const bars=[];const n=Math.floor(intensity*8)+2;
  for(let i=0;i<n;i++){
    const y=Math.random()*100,h=Math.random()*(g>.6?8:3)+.5;
    const col=Math.random()<.5?
      `rgba(255,0,255,${Math.random()*(intensity*.6+.1)})`:
      `rgba(0,255,255,${Math.random()*(intensity*.4+.05)})`;
    bars.push(`linear-gradient(to bottom,transparent ${y}%,${col} ${y}%,${col} ${y+h}%,transparent ${y+h}%)`);
  }
  const tx=(Math.random()-.5)*intensity*8;
  goEl.style.cssText=`opacity:1;background:${bars.join(',')};transform:translateX(${tx}px);`;

  // At high fragment: flash entire screen
  if(g>80&&Math.random()<(g-80)/20*.4){
    goEl.style.background=`rgba(${Math.random()<.5?255:0},0,${Math.random()<.5?255:0},${Math.random()*.15})`;
  }
}

    document.getElementById('bar-'+id).style.width=Math.round(val)+'%';

function action(type){
  S.lastInteract=Date.now();
  if(type==='talk'){
    if(dlgAdvance())return;
    S.lonely=cl(S.lonely-22);
    // Talking slightly increases fragment (fashion attention = exposure = fragmentation)
    S.glitch=cl(S.glitch+1.5);
    dlgOpen(pickDlg());
    showMsg(pick(MSGS.talk),'normal');
  } else if(type==='dream'){
    S.dream=cl(S.dream+28);S.lonely=cl(S.lonely-8);S.isDreaming=true;
    device.classList.add('dreaming');showMsg(pick(MSGS.dream2),'dream');
    bubbleC.style.opacity='1';rippleC.style.opacity='1';
    setTimeout(()=>{S.isDreaming=false;device.classList.remove('dreaming');
      bubbleC.style.opacity='0';rippleC.style.opacity='0';
      showMsg('> BEBE DESPIERTA. LENTAMENTE.','normal');},9000);
  } else if(type==='fix'){
    S.glitch=cl(S.glitch-35);S.dream=cl(S.dream+4);
    showMsg(pick(MSGS.fix),'normal');
  }
  updateBars();save();
}

    {label:'HALSTON',x:.08,w:.12,y:.06,h:.62,active:rpgScene==='halston'||rpgScene==='inside_halston'},
    {label:'S. BURROWS',x:.22,w:.12,y:.08,h:.58,active:rpgScene==='burrows'||rpgScene==='body_request'},
    {label:'YSL',x:.66,w:.12,y:.08,h:.58,active:rpgScene==='ysl'||rpgScene==='ysl_battle'},
    {label:'GIVENCHY',x:.82,w:.10,y:.10,h:.54,active:false},
  ];
  mirrors.forEach(m=>{
    const mx=W*m.x,my=H*m.y,mW=W*m.w,mH=H*m.h,ga=m.active?.9:.5;
    rpgCtx.fillStyle=`rgba(212,168,67,${ga})`;
    rpgCtx.fillRect(mx-4,my-4,mW+8,mH+8);
    rpgCtx.fillStyle=`rgba(${m.active?'20,15,35':'8,6,18'},.95)`;
    rpgCtx.fillRect(mx,my,mW,mH);
    if(m.active){
      rpgCtx.shadowColor='rgba(255,215,100,.5)';rpgCtx.shadowBlur=18;
      rpgCtx.strokeStyle='rgba(255,215,100,.8)';rpgCtx.lineWidth=2;
      rpgCtx.strokeRect(mx,my,mW,mH);rpgCtx.shadowBlur=0;
    }
    rpgCtx.fillStyle=`rgba(212,168,67,${ga*.8})`;
    rpgCtx.font=`italic 13px 'IM Fell English SC',serif`;rpgCtx.textAlign='center';
    rpgCtx.fillText(m.label,mx+mW/2,my+mH+20);
  });

  // BeBe — imagen completa, pequeña, flotando suavemente al centro
  if(dollImg.complete&&dollImg.naturalWidth>0){
    const dollAspect=dollImg.naturalWidth/dollImg.naturalHeight;
    const bDstH=Math.round(H*.22);
    const bDstW=Math.round(bDstH*dollAspect);
    const bx=W/2-bDstW/2;
    const floatY=Math.sin(rpgAnimT*.7)*5+Math.sin(rpgAnimT*.28)*2;
    const by=H*.32+floatY;
    const glow=0.5+Math.sin(rpgAnimT*.8)*.18;
    rpgCtx.save();
    // Halo dorado
    const haloX=W/2,haloY=by+bDstH*.4;
    const halo=rpgCtx.createRadialGradient(haloX,haloY,bDstW*.1,haloX,haloY,bDstW*.8);
    halo.addColorStop(0,`rgba(255,240,180,${glow*.3})`);
    halo.addColorStop(.6,`rgba(255,215,100,${glow*.08})`);
    halo.addColorStop(1,'transparent');
    rpgCtx.globalCompositeOperation='screen';
    rpgCtx.fillStyle=halo;rpgCtx.fillRect(haloX-bDstW,haloY-bDstH*.5,bDstW*2,bDstH);
    rpgCtx.globalCompositeOperation='source-over';rpgCtx.globalAlpha=1;
    rpgCtx.drawImage(dollImg,bx,by,bDstW,bDstH);
    rpgCtx.restore();
  }
}
function rpgLoop(ts){if(!rpgOpen)return;rpgDraw(ts);requestAnimationFrame(rpgLoop);}

// ── MAIN LOOP ────────────────────────────────────────────────
let lastT=0,lastTkT=Date.now();
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  const now=Date.now(),rDt=(now-lastTkT)/1000;lastTkT=now;

  if(!S.isDreaming){
    const neg=(now-S.lastInteract)/1000;
    S.lonely=cl(S.lonely+(neg>30?.9:.35)*rDt);
    S.dream=cl(S.dream-.22*rDt);
    const fragRate=S.lonely>70?.55:.15;
    S.glitch=cl(S.glitch+fragRate*rDt);
    // Passive natural recovery when not neglected
    if(neg<15) S.glitch=cl(S.glitch-.08*rDt);
  } else {
    S.dream=cl(S.dream-.04*rDt);S.lonely=cl(S.lonely-.12*rDt);
    S.glitch=cl(S.glitch-.22*rDt); // dream heals fragment faster
  }
  S.age+=rDt/60;mT+=dt*SPEED*.15;vhsT+=dt*.8;

  renderMoire();if(S.isDreaming)renderVhs();
  updateBebe(dt);drawBebe();renderGlitch();
  updateBars();drawSprinkles();
  // Dream-mode: bubbles + liquid ripple
  if(S.isDreaming){renderBubbles();renderRipple();}
  else{bubbleCtx.clearRect(0,0,SW,SH);rippleCtx.clearRect(0,0,SW,SH);}

  if(Math.random()<.004){
    let pool=MSGS.idle,type='normal';
    if(S.glitch>70){pool=MSGS.glitch;type='corrupt';}
    else if(S.glitch>40){pool=MSGS.glitch;type='warn';}
    else if(S.lonely>80){pool=MSGS.critical;type='error';}
    else if(S.isDreaming){pool=MSGS.dream;type='dream';}
    else if(S.lonely>55){pool=MSGS.lonely;}
    else if(S.glitch>20){pool=MSGS.bodyReq;}
    showMsg(pick(pool),type);
  }
  save();requestAnimationFrame(loop);
}

// Async init: wait for image before starting animation
(async()=>{
  try{
    dollImg=await loadImage(DOLL_B64);
    setupCanvases();
    updateBars();
    requestAnimationFrame(loop);
  }catch(e){
    console.error('Bebe failed to load:',e);
    sline.textContent='ERROR: failed to initialize.';
